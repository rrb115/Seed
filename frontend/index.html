<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seed | Client</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main class="layout">
    <header class="hero">
      <p class="eyebrow">Workflow Engine</p>
      <h1>Seed</h1>
      <p class="lede">
        Client for manifest, queue, and sync checks.
      </p>
    </header>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem;">
      <h2 style="margin-bottom: 0;">Status</h2>
      <div id="network-status" class="status-online">Online</div>
    </div>

    <div class="grid-main">
      <section class="card">
        <h2>1) Goal</h2>
        <div class="field-group">
          <label for="goal">Goal</label>
          <select id="goal">
            <option value="note_draft">Note Draft (SAFE)</option>
            <option value="support_ticket">Support Ticket (EVENTUAL)</option>
            <option value="checkout">Checkout (UNSAFE)</option>
          </select>
        </div>
        <p id="workflow-safety" style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-secondary);">Choose a workflow.</p>
        <button id="prepare-goal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Prepare
        </button>

        <div id="workflow-viz" class="viz-container" style="margin-top: 1.5rem; display: none;">
          <label>Timeline</label>
          <div id="timeline" class="timeline">
            <!-- Steps will be injected here -->
          </div>
        </div>

        <div id="manifest-viz" class="viz-container" style="margin-top: 1.5rem; display: none;">
          <label id="manifest-label">Resources (0)</label>
          <div id="manifest-list" class="manifest-list">
            <!-- Resources will be injected here -->
          </div>
        </div>

        <p id="manifest-status" style="margin-top: 1rem; font-size: 0.875rem; color: var(--text-secondary);">Idle.</p>
      </section>

      <section class="card">
        <h2>2) Operations</h2>
        <div class="field-group">
          <label for="object-id">Object ID</label>
          <input id="object-id" value="cart:123" />
        </div>

        <div class="field-group">
          <label for="op-type">Operation</label>
          <select id="op-type">
            <option value="add_item">Add Item</option>
            <option value="set_quantity">Set Quantity</option>
            <option value="remove_item">Remove Item</option>
            <option value="set_field">Set Field</option>
          </select>
        </div>

        <div id="op-params-standard" class="grid-2"
          style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
          <div>
            <label for="sku">SKU</label>
            <input id="sku" value="sku-1" />
          </div>
          <div>
            <label for="qty">Qty</label>
            <input id="qty" type="number" value="1" min="0" />
          </div>
        </div>

        <div id="op-params-field" style="display: none; margin-bottom: 1.25rem;">
          <div class="field-group">
            <label for="field-path">Path</label>
            <input id="field-path" value="shipping.city" />
          </div>
          <div class="field-group">
            <label for="field-value">Value</label>
            <input id="field-value" value="Mumbai" />
          </div>
        </div>

        <button id="queue-op" class="secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Queue
        </button>
      </section>
    </div>

    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 style="margin-bottom: 0;">3) Sync</h2>
        <button id="sync-now" style="width: auto; padding: 0.5rem 1.5rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
          Sync
        </button>
      </div>
      <p id="sync-status" style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1rem;">Idle.
      </p>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <div>
          <label>State</label>
          <pre id="objects-view">{}</pre>
        </div>
        <div>
          <label>Log</label>
          <pre id="log" style="font-size: 0.75rem;"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
  <script>
    // Toggle for operation parameter inputs
    document.getElementById('op-type').addEventListener('change', (e) => {
      const isField = e.target.value === 'set_field';
      document.getElementById('op-params-standard').style.display = isField ? 'none' : 'grid';
      document.getElementById('op-params-field').style.display = isField ? 'block' : 'none';
    });
  </script>
</body>

</html>
